<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>21일 글쓰기 챌린지</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #080809;
      --panel:  #101012;
      --panel2: #161618;
      --line:   #252528;
      --line2:  #303035;
      --dim:    #72727c;
      --mid:    #a8a8b4;
      --light:  #d4d4de;
      --white:  #f2f2f6;
      --brass:  #b88818;
      --brass2: #e0aa28;
      --green:  #5aaa6a;
      --mono: 'Share Tech Mono', monospace;
      --impact: 'Bebas Neue', 'Noto Sans KR', sans-serif;
      --body: 'Noto Sans KR', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--light);
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      min-height: 100vh;
    }

    /* ══ 헤더 ══ */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line2);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header-left h1 {
      font-family: var(--impact);
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--white);
      line-height: 1;
    }
    .header-left h1 span { color: var(--brass2); }
    .header-left .sub {
      font-family: var(--mono);
      font-size: 0.74rem;
      letter-spacing: 3px;
      color: var(--dim);
      margin-top: 4px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .live-ts {
      font-family: var(--mono);
      font-size: 0.76rem;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* ══ SITREP ══ */
    .sitrep {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line2);
    }
    .sitrep-item {
      padding: 14px 16px;
      border-right: 1px solid var(--line);
      text-align: center;
    }
    .sitrep-item:last-child { border-right: none; }
    .sitrep-val {
      font-family: var(--impact);
      font-size: 1.7rem;
      letter-spacing: 2px;
      color: var(--white);
      line-height: 1;
      margin-bottom: 3px;
    }
    .sitrep-val.gold  { color: var(--brass2); }
    .sitrep-val.rev   { color: var(--green); }
    .sitrep-lbl {
      font-family: var(--body);
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--dim);
    }

    /* ══ 본문 ══ */
    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    /* ══ 섹션 헤더 ══ */
    .section { margin-bottom: 40px; }
    .sec-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .sec-label {
      font-family: var(--impact);
      font-size: 1.2rem;
      letter-spacing: 3px;
    }
    .sec-label.hof    { color: var(--brass2); }
    .sec-label.gold   { color: var(--white); }
    .sec-label.silver { color: var(--mid); }
    .sec-label.bronze { color: var(--dim); }
    .sec-name {
      font-size: 0.88rem;
      color: var(--dim);
      font-weight: 500;
    }
    .sec-rule { flex: 1; height: 1px; background: var(--line); }
    .sec-count {
      font-family: var(--mono);
      font-size: 0.76rem;
      color: var(--dim);
    }

    /* ══ 명예의 전당 ══ */
    .hof-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: var(--line2);
      border: 1px solid var(--line2);
    }
    .hof-card {
      background: var(--panel);
      padding: 20px 18px;
      border-top: 2px solid var(--brass);
      animation: fadeIn .4s ease both;
      position: relative;
      overflow: hidden;
    }
    .hof-card::before {
      content: '👑';
      position: absolute;
      right: 14px; top: 12px;
      font-size: 1rem;
      opacity: 0.25;
    }
    .hof-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .hof-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--brass);
      object-fit: cover;
      flex-shrink: 0;
    }
    .hof-avatar-placeholder {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--brass);
      background: var(--panel2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--impact);
      font-size: 1.2rem;
      color: var(--brass2);
      flex-shrink: 0;
    }
    .hof-name {
      font-family: var(--impact);
      font-size: 1.35rem;
      letter-spacing: 1.5px;
      color: var(--white);
      line-height: 1.1;
    }
    .hof-stats {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .hof-stat {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--mid);
      background: var(--panel2);
      padding: 3px 8px;
      border: 1px solid var(--line2);
    }
    .hof-review {
      font-size: 0.92rem;
      color: var(--light);
      line-height: 1.7;
      border-top: 1px solid var(--line);
      padding-top: 10px;
      font-style: italic;
    }

    /* ══ 랭킹 리스트 ══ */
    .rank-list {
      border: 1px solid var(--line2);
    }
    .rank-row {
      display: grid;
      grid-template-columns: 48px 1fr 180px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      transition: background .12s;
      animation: fadeIn .3s ease both;
      min-height: 58px;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-row:hover { background: var(--panel2); }

    /* 순위 */
    .rn {
      text-align: center;
      border-right: 1px solid var(--line);
      align-self: stretch;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0;
    }
    .rn-num {
      font-family: var(--impact);
      font-size: 1.15rem;
      letter-spacing: 1px;
      color: var(--dim);
    }
    .rn-num.r1 { color: var(--brass2); font-size: 1.3rem; }
    .rn-num.r2 { color: var(--mid); }
    .rn-num.r3 { color: var(--mid); }

    /* 이름 + 글 + 진행바 */
    .ri {
      padding: 12px 14px;
      min-width: 0;
      border-right: 1px solid var(--line);
    }
    .ri-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--white);
      margin-bottom: 3px;
    }
    .ri-post {
      margin-bottom: 7px;
    }
    .ri-post a {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--dim);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .ri-post a:hover { color: var(--brass2); }
    .ri-post .none {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: #303035;
    }
    .bar-wrap { display: flex; align-items: center; gap: 8px; }
    .bar-track {
      flex: 1;
      height: 3px;
      background: var(--line2);
    }
    .bar-fill {
      height: 100%;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.w  { background: var(--white); }
    .bar-fill.br { background: var(--brass2); }
    .bar-fill.gr { background: var(--mid); }
    .bar-fill.di { background: var(--dim); }
    .bar-pct {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--dim);
      flex-shrink: 0;
      width: 30px;
      text-align: right;
    }

    /* 스탯 */
    .rs {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .rs-row {
      display: flex;
      gap: 16px;
      justify-content: flex-end;
    }
    .rs-item { text-align: right; }
    .rs-val {
      font-family: var(--mono);
      font-size: 0.95rem;
      color: var(--light);
      line-height: 1;
    }
    .rs-val.hi { color: var(--white); }
    .rs-lbl {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 1px;
      color: var(--dim);
    }
    .rs-tags { display: flex; gap: 4px; justify-content: flex-end; flex-wrap: wrap; }

    /* 글 목록 */
    .post-today {
      margin-top: 4px;
    }
    .post-today a {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--mid);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .post-today a:hover { color: var(--brass2); }

    .post-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 5px;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 1px;
      color: var(--dim);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }
    .post-toggle:hover { color: var(--mid); }
    .post-toggle .arrow { transition: transform .2s; display: inline-block; }
    .post-toggle.open .arrow { transform: rotate(90deg); }

    .post-list {
      margin-top: 6px;
      display: none;
      flex-direction: column;
      gap: 4px;
      padding-left: 2px;
      border-left: 1px solid var(--line);
      padding-left: 8px;
    }
    .post-list.open { display: flex; }
    .post-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .post-day {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--dim);
      flex-shrink: 0;
      width: 18px;
      text-align: right;
    }
    .post-item a {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--mid);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .post-item a:hover { color: var(--brass2); text-decoration: underline; }
    .tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 2px 6px;
      letter-spacing: .5px;
    }
    .tag.on  { color: var(--white);  border: 1px solid var(--line2); background: var(--panel2); }
    .tag.off { color: var(--line2);  border: 1px solid var(--line); }
    .tag.rev { color: var(--brass2); border: 1px solid var(--brass); background: rgba(184,136,24,.08); }

    /* 빈 상태 */
    .empty {
      padding: 24px;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.82rem;
      letter-spacing: 3px;
      color: var(--dim);
      border: 1px solid var(--line2);
      background: var(--panel);
    }

    /* 설정 배너 */
    #setup-banner {
      background: var(--panel);
      border-left: 2px solid var(--brass);
      padding: 10px 14px;
      margin-bottom: 24px;
      font-family: var(--mono);
      font-size: 0.84rem;
      color: var(--dim);
      line-height: 1.8;
      display: none;
    }
    #setup-banner code { color: var(--brass2); }

    #status {
      text-align: center;
      padding: 80px 20px;
      font-family: var(--mono);
      font-size: 0.84rem;
      letter-spacing: 3px;
      color: var(--dim);
    }

    /* ══ 토스트 알림 ══ */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #2a1a1a; border: 1px solid var(--red);
      color: var(--mid); font-family: var(--mono); font-size: 0.78rem;
      letter-spacing: 1px; padding: 10px 20px;
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rank-row:nth-child(1){animation-delay:.03s}
    .rank-row:nth-child(2){animation-delay:.06s}
    .rank-row:nth-child(3){animation-delay:.09s}
    .rank-row:nth-child(4){animation-delay:.12s}
    .rank-row:nth-child(5){animation-delay:.15s}
    .rank-row:nth-child(6){animation-delay:.18s}
    .rank-row:nth-child(7){animation-delay:.21s}
    .rank-row:nth-child(8){animation-delay:.24s}

    /* ══ 모바일 최적화 ══ */
    @media (max-width: 600px) {
      /* 헤더: 스택, 버튼 축소 */
      header {
        flex-direction: column;
        align-items: flex-start;
        padding: 14px 16px;
        gap: 10px;
      }
      .header-left h1 { font-size: 1.3rem; }
      .header-right {
        width: 100%;
        flex-wrap: wrap;
        gap: 6px;
      }
      .header-right a, .header-right span[id="day-badge"] {
        font-size: 0.58rem !important;
        padding: 5px 8px !important;
        letter-spacing: 1px !important;
      }
      .live-ts { font-size: 0.6rem; }

      /* SITREP: 2×2 그리드 */
      .sitrep {
        grid-template-columns: repeat(2, 1fr);
      }
      .sitrep-item:nth-child(2) { border-right: none; }
      .sitrep-item:nth-child(3) { border-top: 1px solid var(--line); }
      .sitrep-item:nth-child(4) { border-top: 1px solid var(--line); border-right: none; }
      .sitrep-val { font-size: 1.4rem; }
      .sitrep-lbl { font-size: 0.58rem; }

      /* 미제출 바: 줄바꿈 허용 */
      #nosubmit-bar {
        padding: 10px 16px;
        gap: 8px;
      }
      #nosubmit-names {
        font-size: 0.65rem !important;
        word-break: break-all;
        line-height: 1.6;
      }

      /* 본문 패딩 */
      .content { padding: 20px 12px 80px; }

      /* HOF 그리드: 1열 */
      .hof-grid {
        grid-template-columns: 1fr;
      }

      /* 랭킹: 스탯 컬럼 숨기고 이름 영역 아래에 스탯 인라인 표시 */
      .rank-row {
        grid-template-columns: 40px 1fr;
        min-height: auto;
      }
      /* 스탯(.rs) 독립 컬럼 숨김 */
      .rs { display: none; }

      /* 이름/진행바 영역 폰트 */
      .ri-name { font-size: 0.88rem; }
      .ri-post a { font-size: 0.65rem; }
      .bar-pct { font-size: 0.58rem; }

      /* 섹션 헤더 */
      .sec-label { font-size: 0.95rem; }
      .sec-name  { font-size: 0.72rem; }
      .sec-count { font-size: 0.62rem; }

      /* 태그 */
      .tag { font-size: 0.58rem; padding: 2px 5px; }

      /* 오늘 제출 플로팅 버튼 */
      .fab-submit {
        display: flex;
      }
    }

    /* 플로팅 버튼 — 모바일 전용 */
    .fab-submit {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 16px;
      z-index: 999;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--brass);
      color: var(--bg);
      font-family: var(--impact);
      font-size: 0.58rem;
      letter-spacing: 1px;
      text-decoration: none;
      text-align: center;
      line-height: 1.2;
      box-shadow: 0 4px 14px rgba(184,136,24,.45);
      border: none;
      padding: 6px;
    }
    .fab-submit:hover { background: var(--brass2); }
  </style>
</head>
<body>

<!-- ══ 헤더 ══ -->
<header>
  <div class="header-left">
    <h1><a href="index.html" style="text-decoration:none;color:inherit"><span>21</span>일 글쓰기 챌린지</a></h1>
    <div class="sub">마케팅주의자 · 실시간 성과 대시보드</div>
  </div>
  <div class="header-right">
    <a href="register.html" style="font-family:var(--mono);font-size:.74rem;letter-spacing:2px;color:var(--dim);text-decoration:none;padding:5px 10px;border:1px solid var(--line2);">등록</a>
    <a href="daily.html" style="font-family:var(--mono);font-size:.74rem;letter-spacing:2px;color:var(--brass2);text-decoration:none;padding:5px 10px;border:1px solid var(--brass);background:rgba(184,136,24,.08);">오늘 제출</a>
    <a href="admin.html" style="font-family:var(--mono);font-size:.55rem;letter-spacing:1px;color:var(--line2);text-decoration:none;padding:5px 8px;border:1px solid var(--line);" title="관리자">⚙</a>
    <span id="day-badge" style="display:none;font-family:var(--mono);font-size:.72rem;letter-spacing:2px;color:var(--brass2);padding:3px 8px;border:1px solid var(--brass);background:rgba(184,136,24,.08);"></span>
    <span class="live-dot" style="margin-left:8px"></span>
    <span class="live-ts" id="live-ts">—</span>
  </div>
</header>

<!-- ══ SITREP ══ -->
<div class="sitrep" id="sitrep">
  <div class="sitrep-item"><div class="sitrep-val">—</div><div class="sitrep-lbl">참가자</div></div>
  <div class="sitrep-item"><div class="sitrep-val gold">—</div><div class="sitrep-lbl">골드 이상</div></div>
  <div class="sitrep-item"><div class="sitrep-val rev">—</div><div class="sitrep-lbl">매출 달성</div></div>
  <div class="sitrep-item"><div class="sitrep-val">—</div><div class="sitrep-lbl">누적 조회수</div></div>
</div>

<!-- ══ 미제출 현황 바 ══ -->
<div id="nosubmit-bar" style="display:none;background:#140808;border-bottom:1px solid #3a1010;padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
  <span style="font-family:var(--mono);font-size:.75rem;letter-spacing:2px;color:#e04040;font-weight:700;">⚠ 오늘 미제출</span>
  <span id="nosubmit-count" style="font-family:var(--mono);font-size:.75rem;color:var(--white);background:rgba(200,50,50,.2);padding:2px 10px;border:1px solid rgba(200,50,50,.3);"></span>
  <span id="nosubmit-names" style="font-family:var(--mono);font-size:.82rem;color:var(--mid);letter-spacing:1px;"></span>
</div>

<!-- ══ 본문 ══ -->
<div class="content">
  <div id="setup-banner">
    구글 시트 → 파일 &gt; 공유 &gt; 웹에 게시 → CSV 선택 → URL 복사 → 코드 상단 <code>SHEET_CSV_URL</code>에 붙여넣기
  </div>
  <div id="status">데이터 불러오는 중...</div>
  <div id="dashboard" style="display:none"></div>
</div>

<!-- 모바일 전용 플로팅 제출 버튼 -->
<a href="daily.html" class="fab-submit" title="오늘 제출">오늘<br>제출</a>

<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SHEET_CSV_URL = '';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const COL = {
  nickname:0, level:1, postTitle:2, postLink:3,
  totalPosts:4, totalComments:5, totalViews:6,
  maxVisitors:7, inquiry:8, revenue:9, revenueAmt:10, review:11
};
const LEVEL_KEY = {'명예의전당':'hof','골드':'gold','실버':'silver','브론즈':'bronze'};

const SAMPLE = [

  ['한공략','골드','네이버 상위노출 공략 실전 후기','https://example.com','20','31','1650','390','O','O','',''],

  ['권챌린지','브론즈','글쓰기가 이렇게 힘든 줄 몰랐다','https://example.com','9','11','0','0','X','X','',''],

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const num = n => Number(n)||0;

function parseCSV(text){
  return text.trim().split('\n').slice(1).map(line=>{
    const cols=[]; let cur='',inQ=false;
    for(const ch of line){
      if(ch==='"'){inQ=!inQ;continue;}
      if(ch===','&&!inQ){cols.push(cur.trim());cur='';continue;}
      cur+=ch;
    }
    cols.push(cur.trim()); return cols;
  }).filter(r=>r[0]);
}

function group(rows){
  const g={hof:[],gold:[],silver:[],bronze:[]};
  rows.forEach(r=>{
    const k=LEVEL_KEY[(r[COL.level]||'').trim()];
    if(k) g[k].push(r);
  });
  return g;
}

function hofCards(rows){
  if(!rows.length) return `<div class="empty">아직 입성자가 없습니다</div>`;
  return `<div class="hof-grid">${rows.map(r=>{
    const inq   = (r[COL.inquiry]||'').toUpperCase()==='O';
    const views = num(r[COL.totalViews]);
    const name  = esc(r[COL.nickname]);
    const img   = r._imgUrl;
    const avatar = img
      ? `<img class="hof-avatar" src="${esc(img)}" alt="${name}" onerror="this.outerHTML='<div class=hof-avatar-placeholder>${name[0]}</div>'">`
      : `<div class="hof-avatar-placeholder">${name[0]}</div>`;
    return `
    <div class="hof-card">
      <div class="hof-top">
        ${avatar}
        ${r._blogUrl
          ? `<a href="${esc(r._blogUrl)}" target="_blank" rel="noopener" class="hof-name" style="text-decoration:none;cursor:pointer;" title="블로그 보기">${name} ↗</a>`
          : `<div class="hof-name">${name}</div>`}
      </div>
      <div class="hof-stats">
        ${views ? `<span class="hof-stat">조회수 ${views.toLocaleString()}</span>` : ''}
        ${inq   ? `<span class="hof-stat">문의 ✓</span>` : ''}
      </div>
      ${r[COL.review]?`<div class="hof-review">"${esc(r[COL.review])}"</div>`:''}
      ${r._storyUrl?`<a href="${esc(r._storyUrl)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:14px;font-family:var(--mono);font-size:.74rem;letter-spacing:1px;color:var(--brass2);text-decoration:none;border-bottom:1px solid var(--brass);">성과 스토리 보기 →</a>`:''}
    </div>`;
  }).join('')}</div>`;
}

function barHtml(pct, cls){
  return `<div class="bar-wrap">
    <div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.min(100,pct)}%"></div></div>
    <span class="bar-pct">${Math.round(pct)}%</span>
  </div>`;
}

function rankRows(rows, cls){
  if(!rows.length) return `<div class="empty">해당 레벨 참가자가 없습니다</div>`;

  const items = rows.map((r,i)=>{
    const rank = i+1;
    const nc = rank<=3 ? `r${rank}` : '';
    const n = String(rank).padStart(2,'0');
    const posts   = num(r[COL.totalPosts]);
    const views   = num(r[COL.totalViews]);
    const maxV    = num(r[COL.maxVisitors]);
    const cmts    = num(r[COL.totalComments]);
    const inq     = (r[COL.inquiry]||'').toUpperCase()==='O';
    const rev     = (r[COL.revenue]||'').toUpperCase()==='O';

    // 글 목록 (localStorage 경유 시 posts 배열, 샘플/시트 경유 시 단일 글)
    const postsArr = r._posts || (r[COL.postLink] ? [{title: r[COL.postTitle]||r[COL.postLink], link: r[COL.postLink], date:''}] : []);
    const uid = `posts-${i}-${cls}`;
    const latestPost = postsArr[postsArr.length - 1];
    const prevPosts  = postsArr.slice(0, -1).reverse(); // 최신 제외, 역순

    const postListHtml = postsArr.length ? `
      <div class="post-today">${latestPost
        ? `<a href="${esc(latestPost.link)}" target="_blank" rel="noopener">↗ ${esc(latestPost.title||latestPost.link)}</a>`
        : ''}</div>
      ${prevPosts.length ? `
        <button class="post-toggle" onclick="togglePosts('${uid}',this)">
          <span class="arrow">▶</span> 이전 글 ${prevPosts.length}개
        </button>
        <div class="post-list" id="${uid}">
          ${prevPosts.map((p,pi)=>`
            <div class="post-item">
              <span class="post-day">${postsArr.length-1-pi}.</span>
              <a href="${esc(p.link)}" target="_blank" rel="noopener">${esc(p.title||p.link)}</a>
            </div>`).join('')}
        </div>` : ''}
    ` : `<span style="font-family:var(--mono);font-size:.78rem;color:#303035">아직 글 없음</span>`;

    // 공통 스탯 (전 레벨)
    const commonStats = `<div class="rs-row">
      <div class="rs-item"><div class="rs-val hi">${views.toLocaleString()}</div><div class="rs-lbl">누적 조회수</div></div>
      <div class="rs-item"><div class="rs-val">${cmts}</div><div class="rs-lbl">누적 댓글</div></div>
    </div>`;

    const tags = `<div class="rs-tags">
      <span class="tag ${inq?'on':'off'}">${inq?'문의 ✓':'문의 없음'}</span>
      <span class="tag ${rev?'rev':'off'}">${rev?'매출 ✓':'매출 없음'}</span>
    </div>`;

    let bar='', stats='';
    if(cls==='bronze'){
      bar = barHtml(posts/21*100, 'di');
      stats = commonStats + tags;
    } else if(cls==='silver'){
      bar = barHtml(views/1260*100, 'gr');
      stats = commonStats + tags;
    } else if(cls==='gold'){
      bar = barHtml(views/1260*100, 'br');
      stats = commonStats + tags;
    }

    return `<div class="rank-row" style="animation-delay:${i*.04}s">
      <div class="rn"><div class="rn-num ${nc}">${n}</div></div>
      <div class="ri">
        ${r._blogUrl
          ? `<a href="${esc(r._blogUrl)}" target="_blank" rel="noopener" class="ri-name" style="text-decoration:none;color:inherit;cursor:pointer;" title="블로그 보기">${esc(r[COL.nickname])} <span style="font-size:.72rem;color:var(--dim);font-family:var(--mono);">↗</span></a>`
          : `<div class="ri-name">${esc(r[COL.nickname])}</div>`}
        ${postListHtml}
        ${bar}
      </div>
      <div class="rs">${stats}</div>
    </div>`;
  });

  return `<div class="rank-list">${items.join('')}</div>`;
}

function section(label, labelCls, name, rows){
  const inner = labelCls==='hof' ? hofCards(rows) : rankRows(rows, labelCls);
  return `<div class="section">
    <div class="sec-head">
      <span class="sec-label ${labelCls}">${label}</span>
      <span class="sec-name">${name}</span>
      <div class="sec-rule"></div>
      <span class="sec-count">${rows.length}명</span>
    </div>
    ${inner}
  </div>`;
}

function render(rows){
  const g = group(rows);
  const hofCount   = rows.filter(r=>(r[COL.level]||'').trim()==='명예의전당').length;
  const totalViews = rows.reduce((a,r)=>a+num(r[COL.totalViews]),0);
  const totalPosts = rows.reduce((a,r)=>a+num(r[COL.totalPosts]),0);

  document.getElementById('sitrep').innerHTML = `
    <div class="sitrep-item"><div class="sitrep-val">${rows.length}</div><div class="sitrep-lbl">참가자</div></div>
    <div class="sitrep-item"><div class="sitrep-val gold">${totalPosts}</div><div class="sitrep-lbl">총 발행 글</div></div>
    <div class="sitrep-item"><div class="sitrep-val">${totalViews>=10000?(totalViews/10000).toFixed(1)+'만':totalViews.toLocaleString()}</div><div class="sitrep-lbl">누적 조회수</div></div>
    <div class="sitrep-item"><div class="sitrep-val rev">${hofCount}</div><div class="sitrep-lbl">명예의전당</div></div>
  `;

  document.getElementById('dashboard').innerHTML =
    section('👑 명예의 전당','hof','월 100만원+ 달성',g.hof) +
    section('🥇 GOLD','gold','머니 메이커',g.gold) +
    section('🥈 SILVER','silver','트래픽 메이커',g.silver) +
    section('🥉 BRONZE','bronze','생존자',g.bronze);

  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('status').style.display = 'none';

  // D+N 배지
  const dayNum = DB.getDayNumber();
  const badge  = document.getElementById('day-badge');
  if (dayNum) {
    badge.textContent = `D+${dayNum}`;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }

  // 미제출 현황 바
  const nonSubs = DB.getTodayNonSubmitters();
  const nsBar   = document.getElementById('nosubmit-bar');
  if (nonSubs.length > 0) {
    document.getElementById('nosubmit-count').textContent = `${nonSubs.length}명`;
    document.getElementById('nosubmit-names').textContent = nonSubs.map(p => p.nickname).join('  ·  ');
    nsBar.style.display = 'flex';
  } else {
    nsBar.style.display = 'none';
  }

  const now = new Date();
  document.getElementById('live-ts').textContent =
    now.toLocaleDateString('ko-KR') + ' ' +
    now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

function renderFromLocal(){
  const localRows = DB.getDashboardRows();
  if(!localRows.length) return false;
  render(localRows.map(r=>{
    const arr = [
      r.nickname, r.level, '', '',
      r.totalPosts, r.totalComments, r.totalViews,
      r.maxVisitors, r.inquiry, r.revenue, r.revenueAmt, r.review
    ];
    arr._posts    = r.posts;
    arr._storyUrl = r.storyUrl;
    arr._blogUrl  = r.blogUrl;
    arr._imgUrl   = r.imgUrl;
    return arr;
  }));
  return true;
}

async function main(){
  const statusEl = document.getElementById('status');
  const hasLocal = renderFromLocal();

  if(DB.isConnected()){
    if(!hasLocal){
      // 첫 방문자: 로딩 메시지 표시 후 시트에서 가져오기
      statusEl.style.display = 'block';
      statusEl.textContent = '데이터 불러오는 중...';
    }
    try {
      const ok = await DB.pullFromSheets();
      if(ok) renderFromLocal();
      else {
        if(!hasLocal) render(SAMPLE);
        showToast('⚠ 구글 시트 동기화 실패 — 로컬 데이터로 표시 중');
      }
    } catch(e){
      if(!hasLocal) render(SAMPLE);
      showToast('⚠ 구글 시트 연결 오류');
    }
  } else {
    // 시트 미연동: 로컬 있으면 표시, 없으면 샘플
    if(!hasLocal) render(SAMPLE);
  }
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

function togglePosts(uid, btn) {
  const list = document.getElementById(uid);
  const open = list.classList.toggle('open');
  btn.classList.toggle('open', open);
}

main();
setInterval(main, 5*60*1000); // 5분마다 자동 동기화 + 재렌더
</script>
