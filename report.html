<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기수 종료 리포트 — 21일 글쓰기</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #F7F7F6;
      --surface:  #FFFFFF;
      --surface-2:#F0F0EE;
      --border:   #E3E2DE;
      --border-2: #C8C7C0;
      --text:     #18181A;
      --text-2:   #68676B;
      --text-3:   #A4A3A0;
      --hof:      #5B21B6;
      --hof-bg:   #FAF8FF;
      --hof-border:#DDD6FE;
      --gold:     #92400E;
      --gold-bg:  #FDFAF4;
      --gold-border:#E5D8A8;
      --silver:   #1E3A8A;
      --silver-bg:#F5F8FF;
      --silver-border:#BFCFE8;
      --bronze:   #9A3412;
      --bronze-bg:#FDF7F4;
      --bronze-border:#EDD0C0;
      --green:    #14532D;
      --green-bg: #F3FBF5;
      --green-border:#A7F3D0;
      --red:      #991B1B;
      --red-bg:   #FEF7F7;
      --red-border:#FECACA;
      --radius:   6px;
      --radius-sm:4px;
      --font: 'Inter', 'Noto Sans KR', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .header-logo .num { font-size: 1.05rem; font-weight: 800; color: var(--hof); }
    .nav-link {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-3);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      transition: all .12s;
    }
    .nav-link:hover { color: var(--text-2); background: var(--surface-2); }

    .container { max-width: 560px; margin: 32px auto; padding: 0 20px; }

    .page-title { font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -0.4px; margin-bottom: 4px; }
    .page-sub   { font-size: 0.78rem; color: var(--text-3); margin-bottom: 16px; }

    .notice {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 20px;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      color: var(--red);
    }

    /* 리포트 유형 */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .type-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all .12s;
      user-select: none;
    }
    .type-card input { display: none; }
    .type-card .t-icon { font-size: 1.2rem; margin-bottom: 8px; display: block; }
    .type-card .t-name { font-size: 0.84rem; font-weight: 700; color: var(--text-2); margin-bottom: 3px; }
    .type-card .t-desc { font-size: 0.74rem; color: var(--text-3); line-height: 1.5; }
    .type-card:hover { border-color: var(--border-2); }
    .type-card.active-success { border-color: var(--green); background: var(--green-bg); }
    .type-card.active-success .t-name { color: var(--green); }
    .type-card.active-failure { border-color: var(--red); background: var(--red-bg); }
    .type-card.active-failure .t-name { color: var(--red); }

    .form-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .sec-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px 10px;
      border-top: 1px solid var(--border);
    }
    .sec-row:first-child { border-top: none; padding-top: 20px; }
    .sec-label {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 1.2px;
      color: var(--text-3);
      text-transform: uppercase;
    }
    .sec-line { flex: 1; height: 1px; background: var(--border); }

    .fields { padding: 0 20px; }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 5px;
    }
    .field label .req { color: var(--hof); margin-left: 1px; }
    .field label .hint { font-weight: 400; font-size: 0.74rem; color: var(--text-3); margin-left: 5px; }

    .field-hint {
      margin-top: 5px;
      font-size: 0.72rem;
      color: var(--text-3);
      line-height: 1.55;
      padding: 7px 10px;
      background: var(--surface-2);
      border-left: 2px solid var(--border-2);
    }

    input[type=text], input[type=number], select, textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      padding: 9px 12px;
      min-height: 40px;
      outline: none;
      transition: border-color .12s, background .12s;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--hof);
      background: var(--surface);
    }
    input::placeholder, textarea::placeholder { color: var(--text-3); }
    textarea { resize: vertical; min-height: 100px; line-height: 1.65; }
    select { cursor: pointer; }
    select option { background: var(--surface); }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .section-success, .section-failure { display: none; }
    .section-success.show, .section-failure.show { display: block; }

    /* 파일 업로드 */
    .file-area {
      display: block;
      border: 1px dashed var(--border-2);
      border-radius: var(--radius-sm);
      background: var(--surface-2);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all .12s;
    }
    .file-area:hover { border-color: var(--hof); background: var(--hof-bg); }
    .file-area input { display: none; }
    .file-icon { font-size: 1.2rem; margin-bottom: 6px; display: block; }
    .file-text { font-size: 0.76rem; font-weight: 500; color: var(--text-3); }
    .file-list { margin-top: 6px; font-size: 0.74rem; color: var(--hof); font-weight: 500; }

    .submit-wrap { padding: 0 20px 20px; }
    .submit-btn {
      width: 100%;
      padding: 12px;
      min-height: 44px;
      background: var(--text);
      color: #fff;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .12s;
    }
    .submit-btn:hover { background: #333; }

    #done { display: none; text-align: center; padding: 60px 20px; }
    .done-icon {
      width: 52px; height: 52px;
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      margin: 0 auto 16px;
    }
    #done h2 { font-size: 1.3rem; font-weight: 800; color: var(--text); letter-spacing: -0.3px; margin-bottom: 6px; }
    #done p { font-size: 0.84rem; color: var(--text-3); line-height: 1.7; }
    #done a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
    }
    #done a:hover { background: var(--surface-2); }

    @media (max-width: 600px) {
      header { padding: 0 14px; height: 48px; }
      .container { margin: 20px auto; padding: 0 14px; }
      input[type=text], input[type=number], select, textarea { font-size: 16px; }
      .type-grid { gap: 6px; }
      .grid2, .grid3 { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="header-logo"><span class="num">21</span>일 글쓰기</a>
  <a class="nav-link" href="index.html">← 대시보드</a>
</header>

<div class="container">
  <div class="page-title">기수 종료 리포트</div>
  <div class="page-sub">21일 종료 후 2~3일 내 제출</div>

  <div class="notice">⚠ 미제출 시 보증금 몰수 + 다음 기수 참여 불가</div>

  <div class="type-grid">
    <label class="type-card" id="card-success">
      <input type="radio" name="reportType" value="성과" required />
      <span class="t-icon">📈</span>
      <div class="t-name">성과 리포트</div>
      <div class="t-desc">KPI를 달성했거나 유의미한 결과가 나온 경우</div>
    </label>
    <label class="type-card" id="card-failure">
      <input type="radio" name="reportType" value="실패" />
      <span class="t-icon">📉</span>
      <div class="t-name">실패 리포트</div>
      <div class="t-desc">KPI에 미달했거나 예상과 다른 결과가 나온 경우</div>
    </label>
  </div>

  <div class="form-wrap">
    <form id="report-form">

      <div class="sec-row"><span class="sec-label">기본 정보</span><div class="sec-line"></div></div>
      <div class="fields">
        <div class="field">
          <label>닉네임<span class="req">*</span></label>
          <input type="text" name="nickname" required placeholder="등록 시 사용한 닉네임" />
        </div>
        <div class="grid2">
          <div class="field">
            <label>기수<span class="req">*</span></label>
            <select name="cohort" required>
              <option value="">선택</option>
              <option value="1">1기</option>
              <option value="2">2기</option>
              <option value="3">3기</option>
            </select>
          </div>
          <div class="field">
            <label>최종 레벨<span class="req">*</span></label>
            <select name="finalLevel" required>
              <option value="">선택</option>
              <option value="브론즈">🥉 브론즈</option>
              <option value="실버">🥈 실버</option>
              <option value="골드">🥇 골드</option>
              <option value="명예의전당">👑 명예의전당</option>
            </select>
          </div>
        </div>
      </div>

      <div class="sec-row"><span class="sec-label">최종 수치</span><div class="sec-line"></div></div>
      <div class="fields">
        <div class="grid3">
          <div class="field">
            <label>총 발행 글 수</label>
            <input type="number" name="totalPosts" placeholder="0" min="0" max="21" />
          </div>
          <div class="field">
            <label>21일 총 조회수</label>
            <input type="number" name="totalViews" placeholder="0" min="0" />
          </div>
          <div class="field">
            <label>최대 하루 방문자</label>
            <input type="number" name="maxVisitors" placeholder="0" min="0" />
          </div>
        </div>
        <div class="grid2">
          <div class="field">
            <label>문의 발생 건수</label>
            <input type="number" name="inquiryCount" placeholder="0" min="0" />
          </div>
          <div class="field">
            <label>21일 총 매출 (원)</label>
            <input type="number" name="totalRevenue" placeholder="0" min="0" />
          </div>
        </div>
      </div>

      <!-- 성과 분석 -->
      <div class="section-success" id="section-success">
        <div class="sec-row"><span class="sec-label">성과 분석</span><div class="sec-line"></div></div>
        <div class="fields">
          <div class="field">
            <label>무엇을 시도했는가<span class="req">*</span></label>
            <textarea name="whatTried" placeholder="어떤 전략, 글 형식, 키워드, 방식을 시도했는지 구체적으로 작성하세요."></textarea>
            <div class="field-hint">예: 제목에 숫자를 넣는 방식 / 질문형 제목 / 문제 해결형 구조로 바꿨다</div>
          </div>
          <div class="field">
            <label>어떤 수치가 나왔는가<span class="req">*</span></label>
            <textarea name="whatResults" placeholder="구체적인 수치 중심으로 작성하세요."></textarea>
            <div class="field-hint">예: 17일차에 방문자 340명 / 조회수 1,500 달성 / 문의 2건 → 계약 1건</div>
          </div>
          <div class="field">
            <label>다음 기수에서 무엇을 조정할 것인가<span class="req">*</span></label>
            <textarea name="whatNext" placeholder="더 잘 됐을 것 같은 부분, 보완할 점을 작성하세요."></textarea>
          </div>
        </div>
      </div>

      <!-- 실패 분석 -->
      <div class="section-failure" id="section-failure">
        <div class="sec-row"><span class="sec-label">실패 분석</span><div class="sec-line"></div></div>
        <div class="fields">
          <div class="field">
            <label>어떤 가설을 세웠는가<span class="req">*</span></label>
            <textarea name="hypothesis" placeholder="시작할 때 '이렇게 하면 될 것이다'라고 생각했던 것을 작성하세요."></textarea>
            <div class="field-hint">예: 매일 쓰면 조회수가 올라갈 것이다 / 질문형 제목이 클릭을 유도할 것이다</div>
          </div>
          <div class="field">
            <label>실제 수치는 어떻게 나왔는가<span class="req">*</span></label>
            <textarea name="actualResults" placeholder="예상과 다르게 나온 수치를 작성하세요."></textarea>
          </div>
          <div class="field">
            <label>원인은 무엇이라고 생각하는가<span class="req">*</span></label>
            <textarea name="rootCause" placeholder="왜 가설이 틀렸는지, 무엇이 문제였는지 분석하세요."></textarea>
          </div>
        </div>
      </div>

      <div class="sec-row"><span class="sec-label">통계 캡처</span><div class="sec-line"></div></div>
      <div class="fields">
        <div class="field">
          <label>블로그 통계 화면 캡처<span class="req">*</span><span class="hint">네이버 블로그 통계 화면 필수</span></label>
          <label class="file-area">
            <input type="file" name="statsCapture" accept="image/*" multiple />
            <span class="file-icon">📎</span>
            <div class="file-text">클릭하여 파일 선택 · 여러 장 가능</div>
            <div class="file-list" id="file-list"></div>
          </label>
        </div>
      </div>

      <div class="submit-wrap">
        <button type="submit" class="submit-btn">리포트 제출</button>
      </div>
    </form>
  </div>

  <div id="done">
    <div class="done-icon">✓</div>
    <h2>리포트 제출 완료</h2>
    <p>수고했습니다.<br>운영진이 확인 후 레벨 심사를 진행합니다.</p>
    <a href="index.html">대시보드에서 확인하기 →</a>
  </div>
</div>

<script src="data.js"></script>
<script>
  document.querySelectorAll('input[name="reportType"]').forEach(r => {
    r.addEventListener('change', () => {
      document.getElementById('card-success').classList.toggle('active-success', r.value === '성과');
      document.getElementById('card-failure').classList.toggle('active-failure', r.value === '실패');
      document.getElementById('section-success').classList.toggle('show', r.value === '성과');
      document.getElementById('section-failure').classList.toggle('show', r.value === '실패');
    });
  });

  document.querySelectorAll('.type-card').forEach(card => {
    card.addEventListener('click', () => {
      const input = card.querySelector('input');
      input.checked = true;
      input.dispatchEvent(new Event('change', {bubbles: true}));
    });
  });

  document.querySelector('input[name="statsCapture"]').addEventListener('change', function() {
    document.getElementById('file-list').textContent = [...this.files].map(f => f.name).join(', ');
  });

  document.getElementById('report-form').addEventListener('submit', e => {
    e.preventDefault();
    const btn = e.target.querySelector('.submit-btn');
    btn.disabled = true;
    btn.textContent = '제출 중...';

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);
    delete data.statsCapture; // 파일은 텍스트 저장 불가, 제외

    DB.saveReport(data);

    document.getElementById('report-form').style.display = 'none';
    document.getElementById('done').style.display = 'block';
  });
</script>
</body>
</html>
